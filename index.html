<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Roman Tasks" />
  <meta name="theme-color" content="#0e0f13" />
  <title>Roman — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:              #0e0f13;
      --surface:         #16181f;
      --surface2:        #1e2029;
      --border:          #2a2d3a;
      --accent-uni:      #6c9fff;
      --accent-credit:   #f4a94e;
      --accent-personal: #7ee8a2;
      --accent-urgent:   #ff6b6b;
      --accent-snooze:   #c084fc;
      --text:            #e8eaf0;
      --text-dim:        #7a7f96;
      --text-muted:      #454960;
      --radius:          12px;
      --mono:            'DM Mono', monospace;
      --serif:           'DM Serif Display', serif;
      --sans:            'Syne', sans-serif;
      --header-h:        64px;
      --bottom-bar-h:    64px;
      --safe-top:        env(safe-area-inset-top, 0px);
      --safe-bottom:     env(safe-area-inset-bottom, 0px);
      --safe-left:       env(safe-area-inset-left, 0px);
      --safe-right:      env(safe-area-inset-right, 0px);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }

    body {
      background:          var(--bg);
      color:               var(--text);
      font-family:         var(--mono);
      min-height:          100%;
      height:              100%;
      display:             flex;
      flex-direction:      column;
      overscroll-behavior: none;
    }

    body::before {
      content:          '';
      position:         fixed;
      inset:            0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:   none;
      z-index:          1;
      opacity:          0.4;
    }

    /* ══ TOAST ══ */
    #toast-container {
      position:       fixed;
      bottom:         calc(var(--bottom-bar-h) + 20px + var(--safe-bottom));
      right:          calc(20px + var(--safe-right));
      z-index:        4000;
      display:        flex;
      flex-direction: column;
      gap:            8px;
      align-items:    flex-end;
      pointer-events: none;
    }

    .toast {
      background:     var(--surface2);
      border:         1px solid var(--border);
      border-radius:  10px;
      padding:        10px 16px;
      font-size:      12px;
      color:          var(--text);
      box-shadow:     0 8px 32px rgba(0,0,0,0.45);
      animation:      toastIn 0.2s ease, toastOut 0.3s ease 2.5s forwards;
      max-width:      260px;
      pointer-events: auto;
    }

    .toast.snooze  { border-left: 3px solid var(--accent-snooze); }
    .toast.success { border-left: 3px solid var(--accent-personal); }
    .toast.info    { border-left: 3px solid var(--accent-uni); }
    .toast.warn    { border-left: 3px solid var(--accent-urgent); }

    @keyframes toastIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }

    /* ══ SNOOZE DROPDOWN ══ */
    .snooze-wrap { position: relative; }

    .snooze-menu {
      position:       absolute;
      bottom:         calc(100% + 6px);
      right:          0;
      background:     var(--surface2);
      border:         1px solid var(--border);
      border-radius:  10px;
      padding:        6px;
      display:        none;
      flex-direction: column;
      gap:            3px;
      z-index:        700;
      min-width:      158px;
      box-shadow:     0 10px 28px rgba(0,0,0,0.55);
    }

    .snooze-menu.open { display: flex; }

    .snooze-opt {
      padding:     8px 12px;
      border-radius: 6px;
      font-size:   12px;
      color:       var(--text-dim);
      cursor:      pointer;
      transition:  background 0.12s, color 0.12s;
      white-space: nowrap;
      background:  none;
      border:      none;
      font-family: var(--mono);
      text-align:  left;
      width:       100%;
    }

    .snooze-opt:hover        { background: var(--border); color: var(--text); }
    .snooze-opt.cancel       { color: var(--accent-urgent); }
    .snooze-opt.cancel:hover { background: rgba(255,107,107,0.1); }

    /* ══ HEADER ══ */
    header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      padding:         0 20px;
      padding-top:     var(--safe-top);
      border-bottom:   1px solid var(--border);
      position:        sticky;
      top:             0;
      background:      rgba(14,15,19,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index:         200;
      height:          calc(var(--header-h) + var(--safe-top));
      flex-shrink:     0;
      gap:             14px;
    }

    .header-date {
      display:        flex;
      flex-direction: column;
      gap:            1px;
      min-width:      0;
    }

    .header-weekday {
      font-family:    var(--sans);
      font-size:      18px;
      font-weight:    800;
      letter-spacing: 0.01em;
      line-height:    1;
      white-space:    nowrap;
    }

    .header-fulldate {
      font-size:      10px;
      color:          var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space:    nowrap;
    }

    .header-stats {
      display:        flex;
      gap:            6px;
      align-items:    center;
      flex:           1;
      justify-content: center;
    }

    .stat-pill {
      display:        flex;
      flex-direction: row;
      align-items:    center;
      gap:            5px;
      padding:        4px 10px;
      background:     var(--surface);
      border:         1px solid var(--border);
      border-radius:  20px;
    }

    .stat-num   { font-family: var(--sans); font-size: 14px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    .header-right {
      display:     flex;
      gap:         8px;
      align-items: center;
      flex-shrink: 0;
    }

    .icon-btn {
      width:           36px;
      height:          36px;
      border-radius:   9px;
      border:          1px solid var(--border);
      background:      var(--surface);
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      font-size:       16px;
      transition:      border-color 0.15s, color 0.15s, background 0.15s;
      color:           var(--text-dim);
      position:        relative;
      flex-shrink:     0;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:hover            { border-color: var(--text-dim); color: var(--text); }
    .icon-btn.enabled          { border-color: var(--accent-personal); color: var(--accent-personal); }
    .icon-btn.menu-open        { border-color: var(--text-dim); background: var(--surface2); color: var(--text); }

    .notif-dot {
      position:      absolute;
      top:           -3px;
      right:         -3px;
      width:         7px;
      height:        7px;
      border-radius: 50%;
      background:    var(--accent-urgent);
      display:       none;
    }

    .icon-btn.has-alert .notif-dot { display: block; }

    /* ══ MAIN ══ */
    main {
      display:        flex;
      flex-direction: column;
      flex:           1;
      min-height:     0;
      position:       relative;
    }

    /* ══ TOP BAR ══ */
    .top-bar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       10px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink:   0;
      background:    var(--bg);
    }

    .view-title {
      font-family:   var(--sans);
      font-size:     15px;
      font-weight:   700;
      color:         var(--text);
      white-space:   nowrap;
      min-width:     80px;
    }

    .search-box {
      display:       flex;
      align-items:   center;
      gap:           7px;
      background:    var(--surface);
      border:        1px solid var(--border);
      border-radius: 8px;
      padding:       7px 12px;
      flex:          1;
      min-width:     0;
      transition:    border-color 0.15s;
    }

    .search-box:focus-within { border-color: var(--text-muted); }

    .search-box input {
      background:  none;
      border:      none;
      outline:     none;
      color:       var(--text);
      font-family: var(--mono);
      font-size:   16px;
      width:       100%;
    }

    .search-box input::placeholder { color: var(--text-muted); font-size: 13px; }

    /* ══ FILTER BAR ══ */
    .filter-bar {
      display:       flex;
      gap:           6px;
      padding:       8px 20px;
      border-bottom: 1px solid var(--border);
      align-items:   center;
      flex-wrap:     nowrap;
      flex-shrink:   0;
      overflow-x:    auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      padding:     4px 11px;
      border-radius: 20px;
      font-size:   11px;
      cursor:      pointer;
      border:      1px solid var(--border);
      background:  transparent;
      color:       var(--text-muted);
      font-family: var(--mono);
      transition:  background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-chip:hover,
    .filter-chip:active { color: var(--text-dim); border-color: var(--text-dim); }
    .filter-chip.active { background: var(--surface2); color: var(--text); border-color: var(--text-dim); }

    .filter-chip.prio-high.active   { border-color: rgba(255,107,107,0.5); color: var(--accent-urgent); background: rgba(255,107,107,0.07); }
    .filter-chip.prio-medium.active { border-color: rgba(244,169,78,0.5);  color: var(--accent-credit);  background: rgba(244,169,78,0.07); }
    .filter-chip.prio-low.active    { border-color: var(--text-muted);     color: var(--text-dim);       background: var(--surface2); }

    .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 1px; flex-shrink: 0; }

    .sort-select {
      margin-left:   auto;
      background:    var(--surface);
      border:        1px solid var(--border);
      color:         var(--text-dim);
      font-family:   var(--mono);
      font-size:     11px;
      padding:       4px 8px;
      border-radius: 6px;
      cursor:        pointer;
      outline:       none;
      flex-shrink:   0;
      appearance:    auto;
    }

    /* ══ TEMPLATE RAPIDI ══ */
    .template-grid {
      display:       flex;
      gap:           7px;
      padding:       10px 20px;
      border-bottom: 1px solid var(--border);
      overflow-x:    auto;
      flex-wrap:     nowrap;
      flex-shrink:   0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .template-grid::-webkit-scrollbar { display: none; }

    .template-card {
      padding:     6px 12px;
      border:      1px dashed var(--border);
      border-radius: 8px;
      cursor:      pointer;
      transition:  border-color 0.15s, color 0.15s, background 0.15s;
      font-size:   11px;
      color:       var(--text-muted);
      display:     flex;
      align-items: center;
      gap:         5px;
      white-space: nowrap;
      background:  none;
      font-family: var(--mono);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .template-card:hover,
    .template-card:active { border-color: var(--text-muted); color: var(--text); background: var(--surface); }

    /* ══ PROGRESS ══ */
    .progress-bar-wrap {
      height:     3px;
      background: var(--border);
      flex-shrink: 0;
      overflow:   hidden;
    }

    .progress-bar-fill {
      height:     100%;
      background: linear-gradient(90deg, var(--accent-uni), var(--accent-personal));
      transition: width 0.5s ease;
    }

    /* ══ TASK AREA ══ */
    .task-area {
      flex:                       1;
      overflow-y:                 auto;
      padding:                    14px 20px;
      padding-bottom:             calc(var(--bottom-bar-h) + 24px + var(--safe-bottom));
      min-height:                 0;
      -webkit-overflow-scrolling: touch;
    }

    .task-group-header {
      display:       flex;
      align-items:   center;
      gap:           12px;
      margin-bottom: 8px;
      margin-top:    18px;
    }

    .task-group-header:first-child { margin-top: 0; }

    .group-label {
      font-size:      9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color:          var(--text-muted);
      white-space:    nowrap;
    }

    .group-line { flex: 1; height: 1px; background: var(--border); }

    /* ══ DRAG & DROP ══ */
    .drag-handle {
      display:         flex;
      align-items:     center;
      justify-content: center;
      width:           18px;
      flex-shrink:     0;
      color:           var(--text-muted);
      font-size:       14px;
      cursor:          grab;
      opacity:         0;
      transition:      opacity 0.15s;
      touch-action:    none;
      user-select:     none;
      -webkit-user-select: none;
      letter-spacing:  -2px;
    }

    @media (hover: none) { .drag-handle { opacity: 0.3; } }
    .task-card:hover .drag-handle { opacity: 0.45; }
    .drag-handle:hover             { opacity: 1 !important; color: var(--text-dim); }
    .drag-handle:active            { cursor: grabbing; }

    .task-card.dragging { opacity: 0.35; transform: scale(0.98); cursor: grabbing; box-shadow: none; }

    .drag-ghost {
      position:       fixed;
      top:            0;
      left:           0;
      z-index:        3000;
      pointer-events: none;
      opacity:        0.9;
      transform-origin: top left;
      box-shadow:     0 12px 40px rgba(0,0,0,0.55);
      border-radius:  var(--radius);
      transition:     none;
    }

    .drop-indicator {
      height:       3px;
      margin:       -2px 0 5px;
      border-radius: 3px;
      background:   var(--accent-uni);
      opacity:      0;
      transition:   opacity 0.12s;
      pointer-events: none;
    }

    .drop-indicator.active { opacity: 1; }

    /* ══ CARD TASK ══ */
    .task-card {
      display:       flex;
      align-items:   flex-start;
      gap:           9px;
      padding:       11px 13px;
      border:        1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      background:    var(--surface);
      transition:    border-color 0.15s, transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      cursor:        pointer;
      position:      relative;
      overflow:      hidden;
      user-select:   none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .task-card::before {
      content:       '';
      position:      absolute;
      left:          0; top: 0; bottom: 0;
      width:         3px;
      border-radius: 3px 0 0 3px;
    }

    .task-card.cat-university::before { background: var(--accent-uni); }
    .task-card.cat-credit::before     { background: var(--accent-credit); }
    .task-card.cat-personal::before   { background: var(--accent-personal); }
    .task-card.cat-urgent::before     { background: var(--accent-urgent); }

    .task-card:hover {
      border-color: var(--text-muted);
      transform:    translateY(-1px);
      box-shadow:   0 4px 20px rgba(0,0,0,0.3);
    }

    .task-card.done { opacity: 0.38; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }

    .task-card.snoozed {
      border-color: rgba(192,132,252,0.25);
      background:   linear-gradient(135deg, var(--surface), rgba(192,132,252,0.04));
    }

    .task-check {
      width:           19px;
      height:          19px;
      border:          1.5px solid var(--border);
      border-radius:   6px;
      flex-shrink:     0;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      transition:      background 0.15s, border-color 0.15s;
      margin-top:      2px;
      background:      var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    .task-check:hover            { border-color: var(--accent-personal); }
    .task-check.checked          { background: var(--accent-personal); border-color: var(--accent-personal); }
    .task-check.checked::after   { content: '✓'; font-size: 10px; color: #0e0f13; font-weight: 700; }

    .task-body   { flex: 1; min-width: 0; }
    .task-title  { font-size: 13px; color: var(--text); margin-bottom: 2px; line-height: 1.4; word-break: break-word; }
    .task-note   { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; word-break: break-word; }

    .task-meta {
      display:     flex;
      align-items: center;
      gap:         6px;
      flex-wrap:   wrap;
      margin-top:  5px;
    }

    .task-tag {
      font-size:      9px;
      padding:        2px 6px;
      border-radius:  4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight:    500;
      white-space:    nowrap;
    }

    .tag-university { background: rgba(108,159,255,0.12); color: var(--accent-uni); }
    .tag-credit     { background: rgba(244,169,78,0.12);  color: var(--accent-credit); }
    .tag-personal   { background: rgba(126,232,162,0.12); color: var(--accent-personal); }
    .tag-urgent     { background: rgba(255,107,107,0.15); color: var(--accent-urgent); }

    .task-date         { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; white-space: nowrap; }
    .task-date.overdue { color: var(--accent-urgent); }

    .task-priority { font-size: 9px; padding: 2px 6px; border-radius: 4px; border: 1px solid; white-space: nowrap; }
    .prio-high     { color: var(--accent-urgent);  border-color: rgba(255,107,107,0.3); }
    .prio-medium   { color: var(--accent-credit);  border-color: rgba(244,169,78,0.3); }
    .prio-low      { color: var(--text-muted);      border-color: var(--border); }

    .snooze-badge {
      display:       inline-flex;
      align-items:   center;
      gap:           4px;
      font-size:     9px;
      padding:       2px 6px;
      border-radius: 4px;
      background:    rgba(192,132,252,0.12);
      color:         var(--accent-snooze);
      border:        1px solid rgba(192,132,252,0.2);
      cursor:        pointer;
      white-space:   nowrap;
      transition:    background 0.12s;
    }

    .snooze-badge:hover,
    .snooze-badge:active { background: rgba(192,132,252,0.22); }

    .task-actions {
      display:     flex;
      gap:         3px;
      opacity:     0;
      transition:  opacity 0.15s;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .task-card:hover .task-actions { opacity: 1; }
    @media (hover: none) { .task-actions { opacity: 1; } }

    .task-action-btn {
      width:           26px;
      height:          26px;
      border-radius:   6px;
      background:      var(--surface2);
      border:          1px solid var(--border);
      color:           var(--text-dim);
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      font-size:       12px;
      transition:      background 0.12s, color 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .task-action-btn:hover        { background: var(--bg); color: var(--text); }
    .task-action-btn:active       { transform: scale(0.92); }
    .task-action-btn.del:hover    { background: rgba(255,107,107,0.1); color: var(--accent-urgent); border-color: rgba(255,107,107,0.3); }
    .task-action-btn.urg:hover    { background: rgba(255,107,107,0.1); color: var(--accent-urgent); border-color: rgba(255,107,107,0.3); }
    .task-action-btn.snooze-btn:hover { background: rgba(192,132,252,0.1); color: var(--accent-snooze); border-color: rgba(192,132,252,0.3); }

    /* ══ EMPTY ══ */
    .empty-state {
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      gap:             10px;
      padding:         60px 20px;
      color:           var(--text-muted);
    }

    .empty-icon { font-size: 36px; opacity: 0.25; }
    .empty-text { font-size: 13px; }

    /* ══ BOTTOM BAR ══ */
    .bottom-bar {
      position:        fixed;
      bottom:          0;
      left:            0;
      right:           0;
      height:          calc(var(--bottom-bar-h) + var(--safe-bottom));
      padding-bottom:  var(--safe-bottom);
      background:      rgba(14,15,19,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top:      1px solid var(--border);
      z-index:         300;
      display:         flex;
      align-items:     stretch;
    }

    .bottom-tabs {
      display:     flex;
      flex:        1;
      align-items: stretch;
    }

    .bottom-tab {
      flex:            1;
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      gap:             3px;
      cursor:          pointer;
      border:          none;
      background:      transparent;
      color:           var(--text-muted);
      font-family:     var(--mono);
      font-size:       10px;
      letter-spacing:  0.08em;
      text-transform:  uppercase;
      transition:      color 0.15s;
      -webkit-tap-highlight-color: transparent;
      padding:         0;
      position:        relative;
    }

    .bottom-tab::before {
      content:      '';
      position:     absolute;
      top:          0;
      left:         50%;
      transform:    translateX(-50%);
      width:        0;
      height:       2px;
      background:   var(--accent-uni);
      border-radius: 0 0 3px 3px;
      transition:   width 0.2s ease;
    }

    .bottom-tab.active         { color: var(--text); }
    .bottom-tab.active::before { width: 32px; }

    .bottom-tab-icon {
      font-size:   18px;
      line-height: 1;
    }

    .bottom-tab-count {
      position:      absolute;
      top:           6px;
      right:         calc(50% - 18px);
      font-size:     9px;
      background:    var(--accent-urgent);
      color:         #fff;
      border-radius: 10px;
      padding:       0 4px;
      min-width:     14px;
      text-align:    center;
      display:       none;
      font-weight:   700;
    }

    .bottom-tab.has-count .bottom-tab-count { display: block; }

    .bottom-fab {
      width:           56px;
      height:          56px;
      border-radius:   50%;
      background:      var(--text);
      color:           var(--bg);
      font-size:       24px;
      font-weight:     300;
      border:          none;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      box-shadow:      0 4px 18px rgba(0,0,0,0.5);
      transition:      transform 0.15s, opacity 0.15s;
      flex-shrink:     0;
      align-self:      center;
      margin:          0 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-fab:active { transform: scale(0.92); }

    /* ══ DRAWER ══ */
    .drawer-overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(0,0,0,0.55);
      z-index:         400;
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
    }

    .drawer-overlay.open { display: block; }

    .drawer {
      position:        fixed;
      top:             0;
      left:            0;
      bottom:          0;
      width:           min(300px, 85vw);
      background:      var(--surface);
      border-right:    1px solid var(--border);
      z-index:         450;
      transform:       translateX(-105%);
      transition:      transform 0.28s cubic-bezier(0.4,0,0.2,1);
      display:         flex;
      flex-direction:  column;
      padding-top:     var(--safe-top);
      padding-bottom:  var(--safe-bottom);
      overflow-y:      auto;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding:         20px 22px 14px;
      border-bottom:   1px solid var(--border);
      display:         flex;
      align-items:     center;
      justify-content: space-between;
    }

    .drawer-logo {
      font-family:    var(--serif);
      font-size:      22px;
      letter-spacing: 0.02em;
    }

    .drawer-close {
      width:           32px;
      height:          32px;
      border-radius:   8px;
      border:          1px solid var(--border);
      background:      var(--surface2);
      color:           var(--text-dim);
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      font-size:       16px;
      -webkit-tap-highlight-color: transparent;
    }

    .drawer-section { padding: 14px 12px 6px; }

    .drawer-label {
      font-size:      9px;
      color:          var(--text-muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom:  6px;
      padding-left:   6px;
    }

    .drawer-btn {
      display:       flex;
      align-items:   center;
      gap:           9px;
      padding:       9px 10px;
      border-radius: 8px;
      cursor:        pointer;
      transition:    background 0.15s, color 0.15s;
      border:        none;
      background:    transparent;
      color:         var(--text-dim);
      font-family:   var(--mono);
      font-size:     13px;
      width:         100%;
      text-align:    left;
      white-space:   nowrap;
      overflow:      hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .drawer-btn:hover  { background: var(--surface2); color: var(--text); }
    .drawer-btn.active { background: rgba(108,159,255,0.08); color: var(--text); }

    .drawer-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .drawer-btn .label-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

    .drawer-btn .count {
      margin-left:   auto;
      font-size:     11px;
      color:         var(--text-muted);
      background:    var(--surface2);
      padding:       2px 6px;
      border-radius: 10px;
      min-width:     20px;
      text-align:    center;
      flex-shrink:   0;
    }

    .drawer-btn.active .count { background: var(--border); color: var(--text-dim); }

    /* ══ MODAL ══ */
    .modal-overlay {
      position:        fixed;
      inset:           0;
      background:      rgba(0,0,0,0.72);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index:         600;
      display:         none;
      align-items:     flex-start;
      justify-content: center;
      padding:         max(20px, var(--safe-top)) 16px max(20px, var(--safe-bottom));
      overflow-y:      auto;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background:    var(--surface);
      border:        1px solid var(--border);
      border-radius: 16px;
      padding:       24px;
      width:         100%;
      max-width:     520px;
      animation:     slideUp 0.22s ease;
      position:      relative;
      flex-shrink:   0;
    }

    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .modal-title { font-family: var(--serif); font-size: 20px; margin-bottom: 18px; }

    .form-group { margin-bottom: 13px; }

    .form-label {
      display:        block;
      font-size:      9px;
      color:          var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom:  5px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width:         100%;
      background:    var(--bg);
      border:        1px solid var(--border);
      border-radius: 8px;
      color:         var(--text);
      font-family:   var(--mono);
      font-size:     16px;
      padding:       9px 12px;
      outline:       none;
      transition:    border-color 0.15s;
    }

    .form-select { appearance: auto; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--text-muted); }
    .form-textarea { min-height: 70px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

    .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

    .cat-option {
      padding:       8px 11px;
      border-radius: 8px;
      border:        1.5px solid var(--border);
      cursor:        pointer;
      font-size:     12px;
      display:       flex;
      align-items:   center;
      gap:           6px;
      transition:    border-color 0.15s, color 0.15s, background 0.15s;
      background:    var(--bg);
      color:         var(--text-dim);
      font-family:   var(--mono);
      width:         100%;
      text-align:    left;
      -webkit-tap-highlight-color: transparent;
    }

    .cat-option:hover { border-color: var(--text-muted); color: var(--text); }
    .cat-option.selected.cat-university { border-color: var(--accent-uni);      color: var(--accent-uni);      background: rgba(108,159,255,0.06); }
    .cat-option.selected.cat-credit     { border-color: var(--accent-credit);   color: var(--accent-credit);   background: rgba(244,169,78,0.06); }
    .cat-option.selected.cat-personal   { border-color: var(--accent-personal); color: var(--accent-personal); background: rgba(126,232,162,0.06); }
    .cat-option.selected.cat-urgent     { border-color: var(--accent-urgent);   color: var(--accent-urgent);   background: rgba(255,107,107,0.06); }

    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    .btn {
      display:       flex;
      align-items:   center;
      gap:           6px;
      padding:       8px 14px;
      border-radius: 8px;
      font-family:   var(--mono);
      font-size:     12px;
      cursor:        pointer;
      border:        none;
      transition:    opacity 0.15s, transform 0.15s;
      white-space:   nowrap;
      min-height:    38px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary { background: var(--text); color: var(--bg); font-weight: 500; }
    .btn-primary:hover  { opacity: 0.85; }
    .btn-primary:active { opacity: 0.7; transform: scale(0.97); }
    .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover  { color: var(--text); }
    .btn-ghost:active { opacity: 0.7; }

    /* ══ SCROLLBAR ══ */
    ::-webkit-scrollbar        { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .header-stats { gap: 4px; }
      .stat-pill { padding: 3px 7px; }
      .stat-label { display: none; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      header { padding-top: calc(6px + var(--safe-top)); }
      .modal { padding: 14px; }
    }
  </style>
</head>
<body>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

  <!-- ═══════ DRAWER ═══════ -->
  <nav class="drawer" id="main-drawer" aria-label="Navigazione">
    <div class="drawer-header">
      <div class="drawer-logo">Roman</div>
      <button class="drawer-close" onclick="closeDrawer()" aria-label="Chiudi menu">✕</button>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Viste</div>
      <button class="drawer-btn active" onclick="setView('all',this)">
        <span class="dot" style="background:var(--text-muted)"></span>
        <span class="label-text">Tutte le task</span>
        <span class="count" id="cnt-all">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('overdue',this)">
        <span class="dot" style="background:var(--accent-urgent)"></span>
        <span class="label-text">Scaduti</span>
        <span class="count" id="cnt-overdue">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('snoozed',this)">
        <span class="dot" style="background:var(--accent-snooze)"></span>
        <span class="label-text">Rimandati</span>
        <span class="count" id="cnt-snoozed">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('done',this)">
        <span class="dot" style="background:var(--accent-personal)"></span>
        <span class="label-text">Completati</span>
        <span class="count" id="cnt-done">0</span>
      </button>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">Categorie</div>
      <button class="drawer-btn" onclick="setView('cat-university',this)">
        <span class="dot" style="background:var(--accent-uni)"></span>
        <span class="label-text">🎓 Università</span>
        <span class="count" id="cnt-university">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('cat-credit',this)">
        <span class="dot" style="background:var(--accent-credit)"></span>
        <span class="label-text">💼 Mediazione Credito</span>
        <span class="count" id="cnt-credit">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('cat-personal',this)">
        <span class="dot" style="background:var(--accent-personal)"></span>
        <span class="label-text">🏠 Personale</span>
        <span class="count" id="cnt-personal">0</span>
      </button>
      <button class="drawer-btn" onclick="setView('cat-urgent',this)">
        <span class="dot" style="background:var(--accent-urgent)"></span>
        <span class="label-text">🔥 Urgente</span>
        <span class="count" id="cnt-urgent">0</span>
      </button>
    </div>
  </nav>

  <!-- ═══════ HEADER ═══════ -->
  <header>
    <div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1;">
      <button class="icon-btn" id="menu-btn" onclick="openDrawer()" aria-label="Menu navigazione" aria-expanded="false" aria-controls="main-drawer">☰</button>
      <div class="header-date">
        <div class="header-weekday" id="hdr-weekday">—</div>
        <div class="header-fulldate" id="hdr-fulldate">—</div>
      </div>
    </div>

    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-num" id="stat-total" style="color:var(--accent-uni)">0</div>
        <div class="stat-label">Tot</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-today" style="color:var(--accent-credit)">0</div>
        <div class="stat-label">Oggi</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-done" style="color:var(--accent-personal)">0</div>
        <div class="stat-label">Fatti</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num" id="stat-overdue" style="color:var(--accent-urgent)">0</div>
        <div class="stat-label">Scad</div>
      </div>
    </div>

    <div class="header-right">
      <button class="icon-btn" id="notif-btn" title="Attiva notifiche" onclick="toggleNotifications()" aria-label="Notifiche">
        🔔<span class="notif-dot" id="notif-dot" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <!-- ═══════ MAIN ═══════ -->
  <main id="main-layout">

    <div class="top-bar">
      <div class="view-title" id="view-title">Tutte le task</div>
      <div class="search-box">
        <span style="color:var(--text-muted);font-size:14px" aria-hidden="true">⌕</span>
        <input
          type="search"
          id="search-input"
          placeholder="Cerca…"
          oninput="renderTasks()"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Cerca task"
        />
      </div>
    </div>

    <div class="filter-bar" role="toolbar" aria-label="Filtri">
      <button class="filter-chip active" data-priority="all"    onclick="setFilter('all',this)">Tutte</button>
      <button class="filter-chip prio-high"   data-priority="high"   onclick="setFilter('high',this)">🔴 Alta</button>
      <button class="filter-chip prio-medium" data-priority="medium" onclick="setFilter('medium',this)">🟡 Media</button>
      <button class="filter-chip prio-low"    data-priority="low"    onclick="setFilter('low',this)">⚪ Bassa</button>
      <div class="filter-sep" aria-hidden="true"></div>
      <button class="filter-chip" id="filter-inc" onclick="toggleInc(this)">Solo da fare</button>
      <select class="sort-select" id="sort-select" onchange="renderTasks()" aria-label="Ordinamento">
        <option value="manual">✦ Personalizzato</option>
        <option value="date">📅 Scadenza</option>
        <option value="priority">🔺 Priorità</option>
        <option value="cat">🏷 Categoria</option>
        <option value="created">🕐 Creazione</option>
      </select>
    </div>

    <div class="template-grid" aria-label="Template rapidi">
      <button class="template-card" onclick="tpl('Preparazione esame','Ripassare schemi, domande tipo e appunti','university','high')">📚 Prep esame</button>
      <button class="template-card" onclick="tpl('Analisi pratica cliente','DSR / PTI / LTV / merito creditizio','credit','high')">📋 Analisi pratica</button>
      <button class="template-card" onclick="tpl('Sessione studio Pomodoro','4 cicli × 25 min, pausa 5 min','university','medium')">⏱ Sessione studio</button>
      <button class="template-card" onclick="tpl('Follow-up cliente','Aggiornamento pratica mutuo / prestito','credit','medium')">📞 Follow-up</button>
      <button class="template-card" onclick="tpl('Ricerca accademica','Google Scholar / JSTOR / SocINDEX','university','medium')">🔍 Ricerca</button>
      <button class="template-card" onclick="tpl('Invio documentazione','CU, buste paga 3 mesi, estratto conto 6 mesi','credit','high')">📤 Invio docs</button>
      <button class="template-card" onclick="tpl('Calcoli LTV/DSR','Reddito netto, rate esistenti, LTV perizia','credit','medium')">🧮 Calcoli LTV</button>
      <button class="template-card" onclick="tpl('Workout / Palestra','','personal','low')">🏋️ Workout</button>
    </div>

    <div class="progress-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="task-area" id="task-area">
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon" aria-hidden="true">✓</div>
        <div class="empty-text">Nessuna task in questa vista.</div>
      </div>
      <div id="task-list" role="list"></div>
    </div>

  </main>

  <!-- ═══════ BOTTOM BAR ═══════ -->
  <div class="bottom-bar">
    <div class="bottom-tabs">
      <button class="bottom-tab active" id="tab-all" onclick="switchTab('all')" aria-label="Tutte">
        <span class="bottom-tab-icon">◈</span>
        <span>Tutte</span>
      </button>
      <button class="bottom-tab" id="tab-today" onclick="switchTab('today')" aria-label="Oggi">
        <span class="bottom-tab-icon">◉</span>
        <span>Oggi</span>
        <span class="bottom-tab-count" id="tab-today-count">0</span>
      </button>
    </div>
    <button class="bottom-fab" onclick="openModal()" aria-label="Nuova task">+</button>
    <div class="bottom-tabs">
      <button class="bottom-tab" id="tab-programmate" onclick="switchTab('programmate')" aria-label="Programmate">
        <span class="bottom-tab-icon">◷</span>
        <span>Programmate</span>
        <span class="bottom-tab-count" id="tab-prog-count">0</span>
      </button>
      <button class="bottom-tab" id="tab-menu" onclick="openDrawer()" aria-label="Menu">
        <span class="bottom-tab-icon">≡</span>
        <span>Menu</span>
      </button>
    </div>
  </div>

  <!-- ═══════ MODAL ═══════ -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="modal-inner">
      <h2 class="modal-title" id="modal-title">Nuova Task</h2>

      <div class="form-group">
        <label class="form-label" for="f-title">Titolo *</label>
        <input class="form-input" type="text" id="f-title" placeholder="es. Studiare Bourdieu cap. 4…" autocomplete="off" autocorrect="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="category-grid" role="group" aria-label="Categoria">
          <button class="cat-option cat-university selected" type="button" data-cat="university" onclick="selCat('university')">🎓 Università</button>
          <button class="cat-option cat-credit"             type="button" data-cat="credit"     onclick="selCat('credit')">💼 Credito</button>
          <button class="cat-option cat-personal"           type="button" data-cat="personal"   onclick="selCat('personal')">🏠 Personale</button>
          <button class="cat-option cat-urgent"             type="button" data-cat="urgent"     onclick="selCat('urgent')">🔥 Urgente</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-date">Scadenza</label>
          <input class="form-input" type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-time">Orario</label>
          <input class="form-input" type="time" id="f-time" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-priority">Priorità</label>
          <select class="form-select" id="f-priority">
            <option value="high">🔴 Alta</option>
            <option value="medium" selected>🟡 Media</option>
            <option value="low">⚪ Bassa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-label">Etichetta</label>
          <input class="form-input" type="text" id="f-label" placeholder="LTV, CRIF, Esame…" autocomplete="off" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-subtitle">Materia / Pratica</label>
        <input class="form-input" type="text" id="f-subtitle" placeholder="Sociologia Urbana, Pratica Rossi #087…" autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label" for="f-note">Note</label>
        <textarea class="form-textarea" id="f-note" placeholder="Dettagli, link, calcoli, formule…"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" type="button" onclick="closeModal()">Annulla</button>
        <button class="btn btn-primary" type="button" onclick="saveTask()">Salva — ⌘↵</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    let tasks         = JSON.parse(localStorage.getItem('roman-tasks-v2') || '[]');
    let taskOrder     = JSON.parse(localStorage.getItem('roman-order-v2') || '[]');
    let currentView   = 'all';
    let currentFilter = 'all';
    let filterInc     = false;
    let editingId     = null;
    let activeCategory = 'university';
    let notifEnabled  = false;
    let snoozeMap     = {};
    let activeTab     = 'all';

    const CAT_LABELS = {
      university: '🎓 Università',
      credit:     '💼 Credito',
      personal:   '🏠 Personale',
      urgent:     '🔥 Urgente',
    };

    const VIEW_TITLES = {
      all: 'Tutte le task', today: 'Scadenza Oggi', programmate: 'Programmate',
      upcoming: 'Prossimi 7 giorni', overdue: 'Task Scadute', snoozed: '⏳ Rimandati',
      done: 'Completati', 'cat-university': '🎓 Università', 'cat-credit': '💼 Mediazione Credito',
      'cat-personal': '🏠 Personale', 'cat-urgent': '🔥 Urgente',
    };

    function syncOrder() {
      const ids = tasks.map(t => t.id);
      taskOrder = taskOrder.filter(id => ids.includes(id));
      ids.forEach(id => { if (!taskOrder.includes(id)) taskOrder.push(id); });
      saveOrder();
    }

    function saveOrder() { localStorage.setItem('roman-order-v2', JSON.stringify(taskOrder)); }

    function applyOrder(arr) {
      return [...arr].sort((a, b) => {
        const ia = taskOrder.indexOf(a.id), ib = taskOrder.indexOf(b.id);
        if (ia === -1 && ib === -1) return 0;
        if (ia === -1) return 1; if (ib === -1) return -1;
        return ia - ib;
      });
    }

    function moveTaskBefore(dragId, targetId) {
      const arr = [...taskOrder];
      const from = arr.indexOf(dragId);
      if (from !== -1) arr.splice(from, 1);
      let to = arr.indexOf(targetId);
      if (to === -1) to = arr.length;
      arr.splice(to, 0, dragId);
      taskOrder = arr; saveOrder();
    }

    function moveTaskToEnd(dragId) {
      const arr = taskOrder.filter(id => id !== dragId);
      arr.push(dragId); taskOrder = arr; saveOrder();
    }

    const pad2 = n => String(n).padStart(2, '0');

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function offsetStr(days) {
      const d = new Date(); d.setDate(d.getDate() + days);
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function fmtDate(s) {
      if (!s || typeof s !== 'string') return '';
      const parts = s.split('-');
      if (parts.length !== 3) return s;
      const [y, m, d] = parts;
      return `${d}/${m}/${y}`;
    }

    function isToday(t)       { return t.date === todayStr(); }
    function isOverdue(t)     { return !t.done && !!t.date && t.date < todayStr(); }
    function isUpcoming(t)    { const lim = offsetStr(7); return !t.done && !!t.date && t.date > todayStr() && t.date <= lim; }
    function isProgrammate(t) { return !t.done && !!t.date && t.date > todayStr(); }
    function isSnoozed(t)     { return Object.prototype.hasOwnProperty.call(snoozeMap, t.id); }

    function updateHeaderDate() {
      const d = new Date();
      const weekdays = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
      const months   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
      document.getElementById('hdr-weekday').textContent  = weekdays[d.getDay()];
      document.getElementById('hdr-fulldate').textContent = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function init() {
      updateHeaderDate();
      setInterval(updateHeaderDate, 60000);

      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        notifEnabled = true;
        document.getElementById('notif-btn').classList.add('enabled');
      }

      syncOrder(); renderTasks(); updateCounts();

      setInterval(() => {
        const now = Date.now(); let changed = false;
        for (const sid of Object.keys(snoozeMap)) {
          if (now >= snoozeMap[sid].deadline) {
            const t = tasks.find(x => x.id === Number(sid));
            delete snoozeMap[sid]; changed = true;
            if (t) { showToast(`⏰ Rimando scaduto: "${t.title}"`, 'warn'); sendNotif(`⏰ ${t.title}`, 'Il rimando è scaduto!'); }
          }
        }
        if (changed) { renderTasks(); } else {
          document.querySelectorAll('.sn-cd').forEach(el => { el.textContent = fmtCountdown(Number(el.dataset.id)); });
        }
      }, 10000);
    }

    function openDrawer() {
      document.getElementById('main-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.getElementById('menu-btn').classList.add('menu-open');
      document.getElementById('menu-btn').setAttribute('aria-expanded', 'true');
    }

    function closeDrawer() {
      document.getElementById('main-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('menu-btn').classList.remove('menu-open');
      document.getElementById('menu-btn').setAttribute('aria-expanded', 'false');
    }

    function switchTab(tab) {
      activeTab = tab;
      ['all','today','programmate'].forEach(t => document.getElementById(`tab-${t}`)?.classList.remove('active'));
      document.getElementById(`tab-${tab}`)?.classList.add('active');
      if (tab === 'all')         currentView = 'all';
      if (tab === 'today')       currentView = 'today';
      if (tab === 'programmate') currentView = 'programmate';
      document.querySelectorAll('.drawer-btn').forEach(b => b.classList.remove('active'));
      renderTasks();
    }

    function fmtCountdown(id) {
      const info = snoozeMap[id];
      if (!info) return '';
      const rem = Math.max(0, info.deadline - Date.now());
      if (rem === 0) return 'scaduto';
      const m = Math.floor(rem / 60000), s = Math.floor((rem % 60000) / 1000);
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function snoozeTask(id, mins, e) {
      if (e) e.stopPropagation();
      snoozeMap[id] = { deadline: Date.now() + mins * 60000, mins };
      closeSnoozeMenus(); renderTasks();
      showToast(`⏳ Rimandato di ${mins} minuti`, 'snooze');
    }

    function clearSnooze(id, e) {
      if (e) e.stopPropagation();
      delete snoozeMap[id]; renderTasks();
      showToast('Rimando rimosso', 'info');
    }

    function toggleSnoozeMenu(id, e) {
      e.stopPropagation();
      const menu = document.getElementById(`sm-${id}`);
      if (!menu) return;
      const wasOpen = menu.classList.contains('open');
      closeSnoozeMenus();
      if (!wasOpen) menu.classList.add('open');
    }

    function closeSnoozeMenus() {
      document.querySelectorAll('.snooze-menu.open').forEach(m => m.classList.remove('open'));
    }

    document.addEventListener('click', closeSnoozeMenus);

    let dnd = { active: false, dragId: null, ghost: null, sourceEl: null, offsetX: 0, offsetY: 0 };

    function startDrag(taskId, e) {
      if (e.target.closest('button, .task-check, .snooze-wrap')) return;
      if (e.button !== undefined && e.button !== 0) return;
      const sort = document.getElementById('sort-select').value;
      if (sort !== 'manual') { showToast('Passa a "Personalizzato" per trascinare', 'info'); return; }
      e.preventDefault(); e.stopPropagation();
      const card = e.currentTarget.closest('.task-card');
      if (!card) return;
      const rect = card.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const ghost = card.cloneNode(true);
      ghost.classList.add('drag-ghost');
      ghost.style.width = rect.width + 'px';
      ghost.style.top   = rect.top + 'px';
      ghost.style.left  = rect.left + 'px';
      const acts = ghost.querySelector('.task-actions');
      if (acts) acts.remove();
      document.body.appendChild(ghost);
      card.classList.add('dragging');
      dnd = { active: true, dragId: taskId, ghost, sourceEl: card, offsetX: clientX - rect.left, offsetY: clientY - rect.top };
      document.addEventListener('pointermove', onDragMove, { passive: false });
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }

    function onDragMove(e) {
      if (!dnd.active) return;
      e.preventDefault();
      dnd.ghost.style.left = (e.clientX - dnd.offsetX) + 'px';
      dnd.ghost.style.top  = (e.clientY - dnd.offsetY) + 'px';
      dnd.ghost.style.pointerEvents = 'none';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      dnd.ghost.style.pointerEvents = '';
      clearDropIndicators();
      if (!el) return;
      const targetCard = el.closest('.task-card');
      if (targetCard && targetCard !== dnd.sourceEl) {
        const tcRect = targetCard.getBoundingClientRect();
        if (e.clientY < tcRect.top + tcRect.height / 2) {
          showDropBefore(targetCard); targetCard.dataset.dropPosition = 'before';
        } else {
          showDropAfter(targetCard); targetCard.dataset.dropPosition = 'after';
        }
        targetCard.dataset.dropTarget = 'true';
      }
    }

    function onDragEnd(e) {
      if (!dnd.active) return;
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      dnd.ghost.style.pointerEvents = 'none';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (el) {
        const targetCard = el.closest('.task-card');
        if (targetCard && targetCard !== dnd.sourceEl) {
          const pos = targetCard.dataset.dropPosition;
          if (pos === 'before') {
            moveTaskBefore(dnd.dragId, Number(targetCard.dataset.id));
          } else {
            const allCards = Array.from(document.querySelectorAll('#task-list .task-card'));
            const tIdx = allCards.indexOf(targetCard);
            const nextCard = allCards[tIdx + 1];
            nextCard ? moveTaskBefore(dnd.dragId, Number(nextCard.dataset.id)) : moveTaskToEnd(dnd.dragId);
          }
          showToast('Ordine aggiornato', 'info');
        }
      }
      clearDropIndicators();
      dnd.sourceEl.classList.remove('dragging');
      dnd.ghost.remove();
      dnd = { active: false, dragId: null, ghost: null, sourceEl: null, offsetX: 0, offsetY: 0 };
      renderTasks();
    }

    function showDropBefore(card) {
      let ind = card.previousSibling;
      if (!ind || !ind.classList || !ind.classList.contains('drop-indicator')) {
        ind = document.createElement('div'); ind.className = 'drop-indicator';
        card.parentNode.insertBefore(ind, card);
      }
      ind.classList.add('active');
    }

    function showDropAfter(card) {
      let ind = card.nextSibling;
      if (!ind || !ind.classList || !ind.classList.contains('drop-indicator')) {
        ind = document.createElement('div'); ind.className = 'drop-indicator';
        card.parentNode.insertBefore(ind, card.nextSibling);
      }
      ind.classList.add('active');
    }

    function clearDropIndicators() {
      document.querySelectorAll('.drop-indicator.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.task-card[data-drop-target]').forEach(el => {
        delete el.dataset.dropTarget; delete el.dataset.dropPosition;
      });
    }

    function getFiltered() {
      let t = [...tasks];
      switch (currentView) {
        case 'today':       t = t.filter(isToday);       break;
        case 'programmate': t = t.filter(isProgrammate);  break;
        case 'upcoming':    t = t.filter(isUpcoming);     break;
        case 'overdue':     t = t.filter(isOverdue);      break;
        case 'snoozed':     t = t.filter(isSnoozed);      break;
        case 'done':        t = t.filter(x => x.done);    break;
        default:
          if (currentView.startsWith('cat-')) { const cat = currentView.slice(4); t = t.filter(x => x.cat === cat); }
      }
      if (currentFilter !== 'all') t = t.filter(x => x.priority === currentFilter);
      if (filterInc)               t = t.filter(x => !x.done);
      const q = (document.getElementById('search-input')?.value ?? '').toLowerCase().trim();
      if (q) t = t.filter(x => [x.title, x.note, x.subtitle, x.label].some(s => (s ?? '').toLowerCase().includes(q)));
      const sort = document.getElementById('sort-select')?.value ?? 'manual';
      const prioRank = { high: 0, medium: 1, low: 2 };
      switch (sort) {
        case 'manual':   t = applyOrder(t); break;
        case 'date':     t.sort((a, b) => (a.date || '9999') < (b.date || '9999') ? -1 : 1); break;
        case 'priority': t.sort((a, b) => (prioRank[a.priority] ?? 1) - (prioRank[b.priority] ?? 1)); break;
        case 'cat':      t.sort((a, b) => a.cat.localeCompare(b.cat)); break;
        default:         t.sort((a, b) => b.id - a.id);
      }
      return t;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const empty = document.getElementById('empty-state');
      const filtered = getFiltered();
      document.getElementById('view-title').textContent = VIEW_TITLES[currentView] ?? '';
      const total = tasks.length, done = tasks.filter(x => x.done).length;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-wrap').setAttribute('aria-valuenow', pct);
      document.getElementById('stat-total').textContent   = total;
      document.getElementById('stat-today').textContent   = tasks.filter(isToday).length;
      document.getElementById('stat-done').textContent    = done;
      document.getElementById('stat-overdue').textContent = tasks.filter(isOverdue).length;
      const overdueCount = tasks.filter(isOverdue).length;
      document.getElementById('notif-dot').style.display = overdueCount > 0 ? 'block' : 'none';
      document.getElementById('notif-btn').classList.toggle('has-alert', overdueCount > 0);
      if (filtered.length === 0) { list.innerHTML = ''; empty.style.display = 'flex'; updateCounts(); return; }
      empty.style.display = 'none';
      const pending = filtered.filter(x => !x.done), completed = filtered.filter(x => x.done);
      let html = '';
      if (pending.length)   html += renderGroup('Da completare', pending);
      if (completed.length) html += renderGroup('Completati',    completed);
      list.innerHTML = html;
      attachDragListeners();
      updateCounts();
    }

    function renderGroup(label, arr) {
      return `<div class="task-group-header">
        <span class="group-label">${label} (${arr.length})</span>
        <div class="group-line" aria-hidden="true"></div>
      </div>` + arr.map(renderCard).join('');
    }

    function renderCard(t) {
      const od = isOverdue(t), sn = isSnoozed(t);
      const pCls = { high:'prio-high', medium:'prio-medium', low:'prio-low' }[t.priority] ?? 'prio-low';
      const pLbl = { high:'Alta', medium:'Media', low:'Bassa' }[t.priority] ?? '';
      let dateStr = '';
      if (t.date) {
        const ts = t.time ? ` ${t.time}` : '';
        dateStr = `<span class="task-date${od?' overdue':''}">📅 ${fmtDate(t.date)}${ts}${od?' · SCADUTO':''}</span>`;
      }
      const snBadge = sn
        ? `<span class="snooze-badge" onclick="event.stopPropagation();clearSnooze(${t.id},event)">⏳ <span class="sn-cd" data-id="${t.id}">${fmtCountdown(t.id)}</span> ×</span>`
        : '';
      const noteHtml = t.note ? `<div class="task-note">${esc(t.note.length > 110 ? t.note.slice(0,110) + '…' : t.note)}</div>` : '';
      const cancelOpt = sn ? `<button class="snooze-opt cancel" type="button" role="menuitem" onclick="clearSnooze(${t.id},event)">× Annulla rimando</button>` : '';
      const isUrg = t.cat === 'urgent', urgEmoji = isUrg ? '🔥' : '⚡';
      return `<div class="task-card cat-${t.cat}${t.done?' done':''}${sn?' snoozed':''}" data-id="${t.id}" onclick="openEdit(${t.id})" role="listitem">
        <div class="drag-handle" title="Trascina per riordinare" aria-hidden="true">⋮⋮</div>
        <div class="task-check${t.done?' checked':''}" onclick="event.stopPropagation();toggleDone(${t.id})" role="checkbox" aria-checked="${t.done}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.stopPropagation();toggleDone(${t.id});}"></div>
        <div class="task-body">
          <div class="task-title">${esc(t.title)}</div>
          ${noteHtml}
          <div class="task-meta">
            <span class="task-tag tag-${t.cat}">${CAT_LABELS[t.cat] ?? t.cat}</span>
            ${t.label    ? `<span class="task-tag" style="background:rgba(255,255,255,0.05);color:var(--text-muted)">${esc(t.label)}</span>` : ''}
            ${t.subtitle ? `<span style="font-size:10px;color:var(--text-muted)">${esc(t.subtitle)}</span>` : ''}
            ${dateStr}
            <span class="task-priority ${pCls}">${pLbl}</span>
            ${snBadge}
          </div>
        </div>
        <div class="task-actions">
          <div class="snooze-wrap">
            <button class="task-action-btn snooze-btn" type="button" title="Rimanda" onclick="toggleSnoozeMenu(${t.id},event)" aria-haspopup="true">⏳</button>
            <div class="snooze-menu" id="sm-${t.id}" role="menu">
              <button class="snooze-opt" type="button" role="menuitem" onclick="snoozeTask(${t.id},10,event)">⏱ +10 min</button>
              <button class="snooze-opt" type="button" role="menuitem" onclick="snoozeTask(${t.id},15,event)">⏱ +15 min</button>
              <button class="snooze-opt" type="button" role="menuitem" onclick="snoozeTask(${t.id},20,event)">⏱ +20 min</button>
              <button class="snooze-opt" type="button" role="menuitem" onclick="snoozeTask(${t.id},30,event)">⏱ +30 min</button>
              ${cancelOpt}
            </div>
          </div>
          <button class="task-action-btn urg" type="button" onclick="event.stopPropagation();toggleUrgent(${t.id})">${urgEmoji}</button>
          <button class="task-action-btn" type="button" title="Modifica" onclick="event.stopPropagation();openEdit(${t.id})">✎</button>
          <button class="task-action-btn del" type="button" title="Elimina" onclick="event.stopPropagation();delTask(${t.id})">×</button>
        </div>
      </div>`;
    }

    function attachDragListeners() {
      document.querySelectorAll('#task-list .task-card').forEach(card => {
        const handle = card.querySelector('.drag-handle');
        if (!handle) return;
        handle.addEventListener('mousedown', e => startDrag(Number(card.dataset.id), e));
        handle.addEventListener('touchstart', e => {
          const touch = e.touches[0];
          startDrag(Number(card.dataset.id), {
            clientX: touch.clientX, clientY: touch.clientY,
            preventDefault: () => e.preventDefault(), stopPropagation: () => e.stopPropagation(),
            currentTarget: handle, target: e.target,
          });
        }, { passive: false });
      });
    }

    function updateCounts() {
      const todayCount = tasks.filter(isToday).length;
      const progCount  = tasks.filter(isProgrammate).length;
      document.getElementById('cnt-all').textContent        = tasks.length;
      document.getElementById('cnt-overdue').textContent    = tasks.filter(isOverdue).length;
      document.getElementById('cnt-snoozed').textContent    = Object.keys(snoozeMap).length;
      document.getElementById('cnt-done').textContent       = tasks.filter(x => x.done).length;
      document.getElementById('cnt-university').textContent = tasks.filter(x => x.cat === 'university').length;
      document.getElementById('cnt-credit').textContent     = tasks.filter(x => x.cat === 'credit').length;
      document.getElementById('cnt-personal').textContent   = tasks.filter(x => x.cat === 'personal').length;
      document.getElementById('cnt-urgent').textContent     = tasks.filter(x => x.cat === 'urgent').length;
      document.getElementById('tab-today-count').textContent = todayCount;
      document.getElementById('tab-prog-count').textContent  = progCount;
      document.getElementById('tab-today').classList.toggle('has-count', todayCount > 0);
      document.getElementById('tab-programmate').classList.toggle('has-count', progCount > 0);
    }

    function toggleDone(id) {
      const t = tasks.find(x => x.id === id); if (!t) return;
      t.done = !t.done;
      if (t.done) { delete snoozeMap[id]; showToast(`✓ "${t.title}" completato!`, 'success'); }
      save(); renderTasks();
    }

    function toggleUrgent(id) {
      const t = tasks.find(x => x.id === id); if (!t) return;
      if (t.cat === 'urgent') { t.cat = t._prevCat ?? 'personal'; delete t._prevCat; showToast('Rimosso dagli urgenti', 'info'); }
      else { t._prevCat = t.cat; t.cat = 'urgent'; showToast('🔥 Segnato come urgente', 'info'); }
      save(); renderTasks();
    }

    function delTask(id) {
      if (!confirm('Eliminare questa task?')) return;
      tasks = tasks.filter(x => x.id !== id);
      taskOrder = taskOrder.filter(x => x !== id);
      delete snoozeMap[id];
      save(); saveOrder(); renderTasks();
      showToast('Task eliminata', 'info');
    }

    function save() { localStorage.setItem('roman-tasks-v2', JSON.stringify(tasks)); }

    function setView(view, el) {
      currentView = view;
      ['all','today','programmate'].forEach(t => document.getElementById(`tab-${t}`)?.classList.remove('active'));
      activeTab = '';
      document.querySelectorAll('.drawer-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      closeDrawer(); renderTasks();
    }

    function setFilter(priority, el) {
      currentFilter = priority;
      document.querySelectorAll('.filter-chip[data-priority]').forEach(b => b.classList.remove('active'));
      el.classList.add('active'); renderTasks();
    }

    function toggleInc(el) {
      filterInc = !filterInc; el.classList.toggle('active', filterInc); renderTasks();
    }

    function openModal(pre = {}) {
      editingId = pre.id ?? null;
      document.getElementById('modal-title').textContent    = editingId ? 'Modifica Task' : 'Nuova Task';
      document.getElementById('f-title').value              = pre.title    ?? '';
      document.getElementById('f-date').value               = pre.date     ?? '';
      document.getElementById('f-time').value               = pre.time     ?? '';
      document.getElementById('f-priority').value           = pre.priority ?? 'medium';
      document.getElementById('f-subtitle').value           = pre.subtitle ?? '';
      document.getElementById('f-label').value              = pre.label    ?? '';
      document.getElementById('f-note').value               = pre.note     ?? '';
      document.getElementById('f-title').style.borderColor = '';
      selCat(pre.cat ?? 'university');
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 80);
    }

    function openEdit(id) { const t = tasks.find(x => x.id === id); if (t) openModal(t); }

    function closeModal() { document.getElementById('modal').classList.remove('open'); editingId = null; }

    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    function saveTask() {
      const inp = document.getElementById('f-title'), title = inp.value.trim();
      if (!title) { inp.style.borderColor = 'var(--accent-urgent)'; inp.focus(); return; }
      inp.style.borderColor = '';
      const originalDone = editingId ? (tasks.find(x => x.id === editingId)?.done ?? false) : false;
      const data = {
        id: editingId ?? Date.now(), title, cat: activeCategory,
        date: document.getElementById('f-date').value, time: document.getElementById('f-time').value,
        priority: document.getElementById('f-priority').value,
        subtitle: document.getElementById('f-subtitle').value.trim(),
        label: document.getElementById('f-label').value.trim(),
        note: document.getElementById('f-note').value.trim(), done: originalDone,
      };
      if (editingId) {
        const idx = tasks.findIndex(x => x.id === editingId);
        if (idx !== -1) tasks[idx] = data; showToast('Task aggiornata', 'info');
      } else { tasks.push(data); syncOrder(); showToast('Task aggiunta!', 'success'); }
      save(); closeModal(); renderTasks();
    }

    function selCat(cat) {
      activeCategory = cat;
      document.querySelectorAll('.cat-option').forEach(btn => btn.classList.toggle('selected', btn.dataset.cat === cat));
    }

    function tpl(title, note, cat, priority) { openModal({ title, note, cat, priority }); }

    async function toggleNotifications() {
      if (notifEnabled) {
        notifEnabled = false; document.getElementById('notif-btn').classList.remove('enabled');
        showToast('Notifiche disattivate', 'info'); return;
      }
      if (typeof Notification === 'undefined') { showToast('Browser non supporta le notifiche', 'warn'); return; }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        notifEnabled = true; document.getElementById('notif-btn').classList.add('enabled');
        showToast('🔔 Notifiche attivate!', 'success'); sendNotif('Roman Task Manager', 'Notifiche attive.');
      } else { showToast('Permesso notifiche negato', 'warn'); }
    }

    function sendNotif(title, body) {
      if (notifEnabled && typeof Notification !== 'undefined' && Notification.permission === 'granted') new Notification(title, { body });
    }

    function showToast(msg, type = 'info') {
      const c = document.getElementById('toast-container');
      const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
      c.appendChild(el); setTimeout(() => el.remove(), 3000);
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeSnoozeMenus(); closeDrawer(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { if (document.getElementById('modal').classList.contains('open')) saveTask(); return; }
      const tag = document.activeElement?.tagName;
      if (e.key === 'n' && tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') openModal();
    });
